dataset:
  name: longmemeval-cleaned
  path: data/longmemeval/longmemeval_s_cleaned.json
  split_manifest: outputs/longmemeval/splits/dev_test_seed42.json
  split_role: test

tuning:
  training_split: dev
  model_path: outputs/longmemeval/models/vmp_v4_seed42.json
  search_report: outputs/longmemeval/models/vmp_v4_seed42_search.json
  split_seed: 42
  tuning_seed: 2025
  trials: 512
  stability_folds: 5
  min_dev_recall_all_at_5: 0.90
  min_dev_delta_vs_dense: 0.02
  ranking_pipeline:
    candidate_generation: dense_top10_safety_set
    candidate_pool_size: 20
    policy_rerank: guarded_top5
    protected_dense_count: 4
    lifecycle: cached_non_destructive

ablation:
  reference_method: vmp_tuned
  frozen_model: outputs/longmemeval/models/vmp_v4_seed42.json
  split_role: test
  methods:
    - vmp_tuned__no_recency
    - vmp_tuned__no_contradiction
    - vmp_tuned__no_redundancy
    - vmp_tuned__no_importance
    - vmp_tuned__no_confidence
    - vmp_tuned__no_token_cost
    - vmp_tuned__no_scope_match
    - vmp_tuned__no_update_operation
    - vmp_tuned__no_merge_operation
    - vmp_tuned__no_archive_operation

cost:
  require_completed_qa: true
  correct_answer_metric: normalized_exact_match
  include_abstention_accuracy: true
  monetary_cost: false
  framework_usage_missing_policy: null_with_coverage
  table_path: outputs/longmemeval/tables/table5_cost.csv

cases:
  retrieval_run: outputs/longmemeval/runs/lme_official_main
  ablation_run: outputs/longmemeval/runs/lme_test_ablation_seed42
  vmp_method: vmp_tuned
  vector_method: naive_vector
  require_completed_qa: true
  output_dir: outputs/longmemeval/cases

retrieval:
  methods:
    - empty
    - bm25
    - naive_vector
    - vector_recency
    - vector_importance
    - vmp_rule
    - vmp_tuned
    - mem0
    - langmem
    - graphiti
    - letta
  ingestion_granularity: session
  top_k: 5
  retrieval_depth: 10
  skip_abstention_for_retrieval: true
  prewarm_embeddings: true

embedding:
  provider: sentence_transformers
  model: BAAI/bge-m3
  device: cuda
  normalize_embeddings: true
  batch_size: 8
  result_cache_db: outputs/longmemeval/cache/bge_m3.sqlite3

reader:
  provider: vllm
  base_url: http://127.0.0.1:8000/v1
  model: Qwen/Qwen2.5-7B-Instruct
  temperature: 0.0
  top_p: 1.0
  max_tokens: 128

output_dir: outputs/longmemeval
